<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنسيق الزجاج المبسط (Minimal Glass)</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* صورة الخلفية الخاصة بك */
            background: url("../assets/img/auth_hero.jpg") center/cover no-repeat;
            background-color: #020617;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* المربع الزجاجي - الكود الأساسي فقط */
        .glass-box {
            /* 1. التعتيم والشفافية */
            background: linear-gradient(150deg, rgba(150, 150, 150, 0.1), rgba(150, 150, 150, 0.1));
            background-color: rgba(100, 100, 100, 0.1);

            /* 2. الضبابية (Blur) */
            backdrop-filter: blur(9px) saturate(150%);
            -webkit-backdrop-filter: blur(9px) saturate(150%);

            /* 3. الحواف والظل */
            border: 1.5px solid rgba(100, 100, 100, 0.100);
            box-shadow: 
                0 0px 50px 2px rgba(0, 0, 0, 0.500),
                0 -5px -8px 0px rgba(255, 255, 255, 0.2),
                
                inset 0 0px 50px 2px rgba(100, 100, 100, 0.500),
                inset 0 -5px -8px 0px rgba(255, 255, 255, 0.5);


            /* 4. الأبعاد والحواف */
            width: 1080px;
            height: 610px;
            aspect-ratio: 16/9;
            border-radius: 32px;
        }

        .glass-box::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.02;

            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
    </style>
</head>

<body>

    <!-- العنصر الزجاجي المقصود -->
    <div class="glass-box"></div>

</body>

</html>
